version: "3"

services:

  api:
    build: .
    container_name: devops-ai-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models

  ui:
    build: .
    container_name: devops-ai-ui
    command: streamlit run ui/chat.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"